<div class="products-page">
  <!-- Weather dashboard widget -->
  <app-weather></app-weather>

  <!-- Header -->
  <div class="products-header">
    <h2>Products</h2>
    <button *ngIf="!showForm" (click)="openForm()" class="btn-primary">+ Add Product</button>
    <button *ngIf="showForm" (click)="cancelEdit()" class="btn-secondary">✕ Cancel</button>
  </div>

  <!-- Add / Edit Form -->
  <div class="product-form" *ngIf="showForm">
    <h3>{{ editingId ? 'Edit Product' : 'New Product' }}</h3>

    <div class="form-error" *ngIf="formError">{{ formError }}</div>

    <form (ngSubmit)="saveProduct()">
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input
            type="text"
            [(ngModel)]="formData.name"
            name="name"
            placeholder="Product name"
            required
          />
        </div>
        <div class="form-group">
          <label>Price ($)</label>
          <input
            type="number"
            [(ngModel)]="formData.price"
            name="price"
            placeholder="0.00"
            min="0"
            step="0.01"
            required
          />
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea
          [(ngModel)]="formData.description"
          name="description"
          placeholder="Product description"
          rows="3"
          required
        ></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">
          {{ editingId ? 'Update Product' : 'Create Product' }}
        </button>
        <button type="button" (click)="cancelEdit()" class="btn-secondary">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Loading / Error -->
  <div *ngIf="loading" class="loading">Loading products...</div>
  <div *ngIf="error && !loading" class="error-msg">{{ error }}</div>

  <!-- Products Grid -->
  <div class="products-grid" *ngIf="!loading">
    <ng-container *ngIf="products$ | async as products">
      <div class="product-card" *ngFor="let product of products">
        <div class="product-header">
          <h3>{{ product.name }}</h3>
          <span class="price">${{ product.price | number:'1.2-2' }}</span>
        </div>
        <p class="description">{{ product.description }}</p>
        <div class="product-actions">
          <button (click)="editProduct(product)" class="btn-edit">Edit</button>
          <button (click)="deleteProduct(product._id!)" class="btn-delete">Delete</button>
        </div>
      </div>

      <div class="empty-state" *ngIf="products.length === 0">
        <p>No products yet. Add your first product above!</p>
      </div>
    </ng-container>
  </div>
</div>
