<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">⚡</div>
    <h2>{{ mode === 'login' ? 'Welcome Back' : 'Create Account' }}</h2>
    <p class="subtitle">{{ mode === 'login' ? 'Sign in to continue' : 'Join us today' }}</p>

    <div class="message" [class.error]="isError" [class.success]="!isError" *ngIf="message">
      {{ message }}
    </div>

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          required
          placeholder="Enter your username"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="Enter your password"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">{{ mode === 'login' ? 'Sign In' : 'Register' }}</span>
        <span *ngIf="loading">Please wait...</span>
      </button>
    </form>

    <p class="toggle-text">
      {{ mode === 'login' ? "Don't have an account?" : 'Already have an account?' }}
      <button (click)="toggle()" class="btn-link">
        {{ mode === 'login' ? 'Register here' : 'Sign in' }}
      </button>
    </p>
  </div>
</div>
